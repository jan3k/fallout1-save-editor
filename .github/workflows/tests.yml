name: tests

on:
  push:
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run unit tests
        run: |
          set +e
          PYTHONPATH=src python3 -m unittest discover -s tests -v 2>&1 | tee unittest.log
          exit ${PIPESTATUS[0]}
      - name: Upload unit test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unittest-log
          path: unittest.log
